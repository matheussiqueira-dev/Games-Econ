<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Games-ECON | Arcade Hand-Tracking Platform</title>
    <base href="/" />

    <!-- Viewport & responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO basico -->
    <meta
      name="description"
      content="Games-ECON — plataforma arcade com controle por rastreamento de maos via MediaPipe. Jogue Galaga e Naruto usando seus gestos."
    />
    <meta name="author" content="Matheus Siqueira" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://games-econ.com/" />

    <!-- Open Graph (compartilhamento social) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://games-econ.com/" />
    <meta property="og:title"       content="Games-ECON | Arcade Hand-Tracking Platform" />
    <meta property="og:description" content="Jogue jogos arcade com rastreamento de maos em tempo real." />
    <meta property="og:image"       content="/assets/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Games-ECON" />
    <meta name="twitter:description" content="Arcade hand-tracking platform por Matheus Siqueira." />
    <meta name="twitter:image"       content="/assets/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Cores do tema (barra de status mobile) -->
    <meta name="theme-color" content="#00e5ff" />
    <meta name="msapplication-TileColor" content="#05070a" />

    <!-- Preconnect para performance de fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fontes -->
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <!-- MediaPipe (versoes fixadas para reproducibilidade) -->
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"
      crossorigin="anonymous"
      defer
    ></script>
  </head>
  <body>
    <!-- Conteudo principal — Angular injeta aqui -->
    <app-root></app-root>

    <!-- Mensagem para navegadores sem JavaScript -->
    <noscript>
      <p style="font-family: sans-serif; text-align: center; padding: 2rem; color: #e6ffff;">
        Games-ECON requer JavaScript habilitado para funcionar.
      </p>
    </noscript>
  </body>
</html>

<aside class="sidebar">
  <div class="sidebar__brand">
    <div class="sidebar__logo-shell">
      <img class="sidebar__logo-image" src="assets/logo.png" alt="Games-ECON Logo" />
    </div>

    <div class="sidebar__brand-copy">
      <p class="sidebar__eyebrow">ENCOM NODE</p>
      <h1 class="sidebar__title">GAMES-ECON</h1>
      <p class="sidebar__subtitle">Neon arcade control matrix</p>
    </div>
  </div>

  <nav class="sidebar__nav" aria-label="System navigation">
    <button class="nav-item nav-item--active" type="button" (click)="onNavigate('/play-dashboard')">
      <span class="material-icons-round nav-icon">dashboard</span>
      <span class="nav-copy">
        <span class="nav-text">Command Grid</span>
        <span class="nav-meta">Lobby + telemetry</span>
      </span>
    </button>

    <button class="nav-item" type="button" (click)="onNavigate('/play-game')">
      <span class="material-icons-round nav-icon">sports_esports</span>
      <span class="nav-copy">
        <span class="nav-text">Arena Link</span>
        <span class="nav-meta">Launch active module</span>
      </span>
    </button>

    <button class="nav-item" type="button" (click)="onNavigate('/sign-up')">
      <span class="material-icons-round nav-icon">person_add</span>
      <span class="nav-copy">
        <span class="nav-text">Enrollment</span>
        <span class="nav-meta">Provision new operator</span>
      </span>
    </button>

    <button class="nav-item" type="button" (click)="onNavigate('/login')">
      <span class="material-icons-round nav-icon">badge</span>
      <span class="nav-copy">
        <span class="nav-text">Access Node</span>
        <span class="nav-meta">Credential gateway</span>
      </span>
    </button>
  </nav>

  <div class="sidebar__status">
    <p class="sidebar__status-label">GRID STATUS</p>
    <div class="sidebar__status-chip">
      <span class="sidebar__status-dot"></span>
      <span>ONLINE</span>
    </div>
    <button class="sidebar__logout" type="button" (click)="onLogout()">
      <span class="material-icons-round">logout</span>
      <span>Terminate Session</span>
    </button>
  </div>
</aside>

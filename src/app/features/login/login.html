<div class="login-container">
  <div class="login-overlay"></div>
  
  <main class="login-main-panel">
    <!-- Left Panel -->
    <div class="login-left-panel">
      <div class="login-bg-nebula"></div>
      <div class="login-bg-overlay"></div>
      
      <div class="login-left-content">
        <div class="login-logo-container">
          <img 
            src="./assets/logo.png" 
            alt="Ag-games Logo" 
            class="login-logo" 
          />
        </div>        
        <!-- Subtitle -->
        <p class="login-welcome-text">
          Welcome back! Please log in to continue your journey.
        </p>
        
        <!-- Back to website button -->
        <button class="login-back-btn" (click)="onBackToWebsite()">
          <span class="material-symbols-outlined">arrow_back</span>
          Back to website
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
    
    <!-- Right Panel -->
    <div class="login-right-panel">
      <div class="login-form-container">
        <!-- Header -->
        <div class="login-header">
          <h2 class="login-title">Log In</h2>
          <p class="login-subtitle">Welcome back! Please log in to continue.</p>
        </div>
        
        <!-- Form -->
        <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">
          <!-- Email Field -->
          <div class="login-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Email"
              [placeholder]="'Enter your email'"
              [value]="email()"
              (valueChange)="onEmailChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Password Field -->
          <div class="login-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Password"
              [placeholder]="'Enter your password'"
              [value]="password()"
              (valueChange)="onPasswordChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Options -->
          <div class="login-options">
            <label class="login-remember">
              <input type="checkbox" class="login-checkbox" />
              <span class="login-checkbox-text">Remember me</span>
            </label>
            <a class="login-forgot" href="#">Forgot password?</a>
          </div>
          
          <!-- Login Button -->
          <button type="button" (click)="onLogin()" class="login-btn">
            Log In
          </button>
        </form>
        
        <!-- Social Divider -->
        <div class="login-social-divider">
          <div class="login-divider-line"></div>
          <span class="login-divider-text">Or log in with</span>
          <div class="login-divider-line"></div>
        </div>
        
        <!-- Social Buttons -->
        <div class="login-social-buttons">
          <button type="button" class="login-social-btn">
            <img 
              src="https://www.google.com/favicon.ico" 
              alt="Google" 
              class="social-icon" 
            />
            <span>Google</span>
          </button>
          <button type="button" class="login-social-btn">
            <svg class="social-icon apple-icon" viewBox="0 0 384 512">
              <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>
        
        <!-- Sign Up Link -->
        <p class="login-signup-text">
          Don't have an account? 
          <app-clickable-link 
            [text]="'Sign Up'" 
            [color]="'#8B5CF6'"
            (clicked)="onSignUp()"
          ></app-clickable-link>
        </p>
      </div>
    </div>
  </main>
</div>

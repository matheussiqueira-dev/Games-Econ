<div class="signup-container">
  <div class="signup-overlay"></div>
  
  <main class="signup-main-panel">
    <!-- Left Panel -->
    <div class="signup-left-panel">
      <div class="signup-bg-nebula"></div>
      <div class="signup-bg-overlay"></div>
      
      <div class="signup-left-content">
        <!-- Logo with glow effect -->
        <div class="signup-logo-container">
          <img 
            src="./assets/logo.png" 
            alt="Ag-games Logo" 
            class="signup-logo" 
          />
        </div>
        <!-- Subtitle -->
        <p class="signup-welcome-text">
          Join the game! Create your account and start playing.
        </p>
        
        <!-- Back to website button -->
        <button class="signup-back-btn" (click)="onBackToWebsite()">
          <span class="material-symbols-outlined">arrow_back</span>
          Back to website
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
    
    <!-- Right Panel -->
    <div class="signup-right-panel">
      <div class="signup-form-container">
        <!-- Header -->
        <div class="signup-header">
          <h2 class="signup-title">Sign Up</h2>
          <p class="signup-subtitle">Create your free account in seconds.</p>
        </div>
        
        <!-- Form -->
        <form class="signup-form" (ngSubmit)="onSignUp()" #signupForm="ngForm">
          <!-- Username Field -->
          <div class="signup-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Text"
              [placeholder]="'Username'"
              [value]="username()"
              (valueChange)="onUsernameChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Email Field -->
          <div class="signup-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Email"
              [placeholder]="'Email address'"
              [value]="email()"
              (valueChange)="onEmailChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Password Field -->
          <div class="signup-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Password"
              [placeholder]="'Password'"
              [value]="password()"
              (valueChange)="onPasswordChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Confirm Password Field -->
          <div class="signup-field">
            <app-hybrid-field
              [type]="InputTypeEnum.Password"
              [placeholder]="'Confirm password'"
              [value]="confirmPassword()"
              (valueChange)="onConfirmPasswordChange($event)"
            ></app-hybrid-field>
          </div>
          
          <!-- Terms Agreement -->
          <div class="signup-terms">
            <label class="signup-terms-label">
              <input 
                type="checkbox" 
                class="signup-checkbox" 
                [checked]="agreeToTerms()"
                (change)="onTermsChange($event)"
              />
              <span class="signup-terms-text">
                I agree to the 
                <a href="#" class="signup-terms-link">Terms of Service</a> 
                and 
                <a href="#" class="signup-terms-link">Privacy Policy</a>
              </span>
            </label>
          </div>
          
          <!-- Sign Up Button -->
          <button 
            type="submit" 
            class="signup-btn"
            [disabled]="!agreeToTerms()"
          >
            Create Account
          </button>
        </form>
        
        <!-- Social Divider -->
        <div class="signup-social-divider">
          <div class="signup-divider-line"></div>
          <span class="signup-divider-text">Or sign up with</span>
          <div class="signup-divider-line"></div>
        </div>
        
        <!-- Social Buttons -->
        <div class="signup-social-buttons">
          <button type="button" class="signup-social-btn">
            <img 
              src="https://www.google.com/favicon.ico" 
              alt="Google" 
              class="social-icon" 
            />
            <span>Google</span>
          </button>
          <button type="button" class="signup-social-btn">
            <svg class="social-icon apple-icon" viewBox="0 0 384 512">
              <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>
        
        <!-- Login Link -->
        <p class="signup-login-text">
          Already have an account? 
          <app-clickable-link 
            [text]="'Log In'" 
            [color]="'#8B5CF6'"
            (clicked)="onLogin()"
          ></app-clickable-link>
        </p>
      </div>
    </div>
  </main>
</div>
